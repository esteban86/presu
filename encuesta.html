<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Construyamos Presu a tu medida</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --mint:#34D399;--mint-bright:#5EEAB8;--ink:#08231A;--tx:#F4F4F3;--mut:#A1A1A6;--mut2:#6B6B72;
    --bg:#08080A;--bg2:#101014;--bg3:#16161A;--line:rgba(255,255,255,.1);--line2:rgba(255,255,255,.16);
    --head:"Space Grotesk",sans-serif;--mono:"JetBrains Mono",monospace
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;background:var(--bg);color:var(--tx);font-family:"Hanken Grotesk",sans-serif;
    line-height:1.5;-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(120% 80% at 50% -10%,rgba(52,211,153,.10),transparent 60%);
    background-attachment:fixed;
  }

  /* Barra de progreso fija */
  .progress{position:fixed;top:0;left:0;right:0;height:4px;background:rgba(255,255,255,.06);z-index:50}
  .progress > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--mint),var(--mint-bright));
    border-radius:0 4px 4px 0;transition:width .5s cubic-bezier(.2,.7,.2,1)}

  /* Botón atrás */
  .back{position:fixed;top:18px;left:18px;z-index:40;display:none;align-items:center;gap:6px;
    background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--mut);
    border-radius:999px;padding:8px 14px 8px 11px;font-size:.85rem;font-family:inherit;cursor:pointer;transition:.18s}
  .back:hover{color:var(--tx);border-color:var(--line2);background:rgba(255,255,255,.08)}
  .back svg{width:14px;height:14px}

  /* Escenario centrado */
  .stage{min-height:100dvh;display:grid;place-items:center;padding:64px 22px}
  .step{width:100%;max-width:560px;margin:0 auto}
  .step.anim{animation:stepIn .45s cubic-bezier(.2,.7,.2,1) both}
  @keyframes stepIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

  .brand{font-family:var(--head);font-weight:700;font-size:21px;letter-spacing:-.02em;margin-bottom:30px}
  .brand span{color:var(--mint)}

  .eb{font-family:var(--mono);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--mint);margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .eb .opt{color:var(--mut2)}
  .q{font-family:var(--head);font-weight:700;font-size:clamp(1.55rem,4.2vw,2.15rem);line-height:1.14;letter-spacing:-.02em;color:#fff;margin:0 0 8px}
  .help{color:var(--mut);font-size:1rem;margin:0 0 26px}

  /* Opciones */
  .opts{display:flex;flex-direction:column;gap:11px;margin:0 0 8px}
  .opt-btn{display:flex;align-items:center;gap:13px;width:100%;text-align:left;
    background:var(--bg2);border:1.5px solid var(--line);border-radius:15px;padding:16px 17px;
    color:var(--tx);font-family:inherit;font-size:1.05rem;font-weight:500;cursor:pointer;transition:.16s;position:relative}
  .opt-btn:hover{border-color:var(--line2);background:var(--bg3);transform:translateY(-1px)}
  .opt-btn .key{flex:none;width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.06);
    border:1px solid var(--line);display:grid;place-items:center;font-family:var(--mono);font-size:.78rem;color:var(--mut);transition:.16s}
  .opt-btn .tick{margin-left:auto;width:22px;height:22px;border-radius:50%;border:1.5px solid var(--line2);
    display:grid;place-items:center;flex:none;color:var(--ink);font-size:13px;opacity:0;transform:scale(.6);transition:.16s}
  .opt-btn.sel{border-color:var(--mint);background:rgba(52,211,153,.10)}
  .opt-btn.sel .key{background:var(--mint);border-color:var(--mint);color:var(--ink);font-weight:700}
  .opt-btn.sel .tick{background:var(--mint);border-color:var(--mint);opacity:1;transform:scale(1)}

  /* Campo de texto */
  .field{width:100%;background:transparent;border:0;border-bottom:2px solid var(--line2);
    color:#fff;font-family:var(--head);font-weight:500;font-size:clamp(1.3rem,3.5vw,1.7rem);
    padding:8px 2px 12px;outline:none;transition:.18s;letter-spacing:-.01em}
  .field::placeholder{color:var(--mut2);font-weight:400}
  .field:focus{border-color:var(--mint)}

  /* Navegación */
  .nav{display:flex;align-items:center;gap:14px;margin-top:26px}
  .btn{border:0;border-radius:13px;padding:14px 26px;font-weight:700;font-size:1rem;cursor:pointer;
    font-family:inherit;transition:.16s;display:inline-flex;align-items:center;gap:9px}
  .btn-mint{background:var(--mint);color:var(--ink)}
  .btn-mint:hover{background:var(--mint-bright)}
  .btn-mint:disabled{background:#1d3a30;color:#5a6b63;cursor:not-allowed}
  .btn .kbd{font-size:.78rem;opacity:.7;font-weight:600}
  .skip{background:none;border:0;color:var(--mut2);font-size:.92rem;cursor:pointer;font-family:inherit;text-decoration:underline;text-underline-offset:3px}
  .skip:hover{color:var(--mut)}
  .hintline{margin-top:18px;font-size:.82rem;color:var(--mut2);display:flex;align-items:center;gap:7px}
  .hintline kbd{font-family:var(--mono);font-size:.72rem;background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:5px;padding:2px 6px;color:var(--mut)}

  /* Intro / estados */
  .lead{font-size:1.08rem;line-height:1.6;color:#D4D4D6;margin:0 0 18px}
  .lead b{color:#fff}
  .pill{display:inline-flex;align-items:center;gap:8px;background:rgba(52,211,153,.10);
    border:1px solid rgba(52,211,153,.4);color:var(--mint-bright);border-radius:999px;
    padding:9px 15px;font-size:.92rem;font-weight:600;margin:0 0 26px}
  .consent{font-size:.85rem;color:var(--mut2);margin:20px 0 0;line-height:1.5}
  .center{text-align:center}

  /* Pantalla final */
  .check{width:84px;height:84px;margin:0 auto 22px;border-radius:50%;background:rgba(52,211,153,.12);
    border:1.5px solid rgba(52,211,153,.5);display:grid;place-items:center;animation:pop .5s cubic-bezier(.2,.9,.3,1.3) both}
  .check svg{width:42px;height:42px;stroke:var(--mint);fill:none;stroke-width:3.5;stroke-linecap:round;stroke-linejoin:round}
  .check svg path{stroke-dasharray:40;stroke-dashoffset:40;animation:draw .5s .25s ease forwards}
  @keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
  @keyframes draw{to{stroke-dashoffset:0}}
  .conf{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:5}
  .conf i{position:absolute;top:-12px;width:9px;height:9px;border-radius:2px;opacity:.9;animation:fall linear forwards}
  @keyframes fall{to{transform:translateY(105dvh) rotate(540deg);opacity:0}}

  .err{color:#FCA5A5;font-size:.9rem;margin-top:12px;min-height:1em}

  @media (pointer: coarse){ .hintline{display:none} }
  @media (prefers-reduced-motion: reduce){
    .step.anim,.check,.check svg path,.conf i{animation:none!important}
    .check svg path{stroke-dashoffset:0}
  }
</style>
</head>
<body>
<div class="progress"><i id="bar"></i></div>
<button class="back" id="backBtn" aria-label="Atrás">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
  Atrás
</button>
<div class="conf" id="conf" aria-hidden="true"></div>

<div class="stage">
  <div class="step" id="step"></div>
</div>

<script>
(function(){
  var API = 'https://presu-waitlist.asimetrica.workers.dev';
  var qs = new URLSearchParams(location.search);
  var email = (qs.get('e') || qs.get('email') || '').trim().toLowerCase();
  var nombre = '';

  // ── Definición de la encuesta ──────────────────────────────
  var STEPS = [
    { id:'edad', type:'single', q:'¿Cuántos años tienes?',
      options:['18–24','25–34','35–44','45 o más'] },
    { id:'ciudad', type:'text', q:'¿En qué ciudad vives?',
      placeholder:'Medellín, Bogotá, Cali…' },
    { id:'metodo', type:'single', q:'Hoy, ¿cómo manejas tu plata?',
      options:['No la organizo','En mi cabeza','Notas o Excel','Una app'] },
    { id:'bancos', type:'multi', q:'¿Qué bancos o apps usas?',
      help:'Elige todas las que uses.',
      options:['Bancolombia','Nu','Nequi','Daviplata','Davivienda','BBVA','Lulo Bank','Scotiabank','Otra'] },
    { id:'dolor', type:'text', q:'¿Qué es lo que más te frustra de organizar tu plata?',
      placeholder:'Escribe lo primero que se te venga…', optional:true },
    { id:'pago', type:'single', q:'¿Cuánto pagarías al mes por una app que lo resuelva?',
      help:'Sé honesto, nos ayuda a que valga la pena.', optional:true,
      options:['No pagaría','Menos de $10.000','$10.000–$20.000','$20.000–$40.000','Más de $40.000'] },
    { id:'ingreso', type:'single', q:'¿En qué rango está tu ingreso mensual?',
      help:'Opcional y anónimo dentro del análisis. Nos ayuda a entender a quién servimos.', optional:true,
      options:['Menos de $1M','$1M–$2.5M','$2.5M–$5M','$5M–$10M','Más de $10M','Prefiero no decir'] }
  ];

  var answers = {};
  var idx = -1;            // -1 = intro; 0..n = preguntas; n = final
  var phase = 'loading';   // loading | gate | intro | q | done | already

  var stepEl = document.getElementById('step');
  var barEl = document.getElementById('bar');
  var backEl = document.getElementById('backBtn');
  var confEl = document.getElementById('conf');

  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];});}

  // ── Arranque: validar correo contra la waitlist ────────────
  function boot(){
    render(); // muestra "cargando…"
    if(!email){ phase='gate'; render(); return; }
    fetch(API+'/survey?e='+encodeURIComponent(email),{cache:'no-store'})
      .then(function(r){return r.json();})
      .then(function(d){
        if(!d || !d.found){ phase='gate'; render(); return; }
        nombre = d.nombre || '';
        if(d.answered){ phase='already'; render(); return; }
        phase='intro'; render();
      })
      .catch(function(){ phase='gate'; render(); });
  }

  // ── Render por fase ────────────────────────────────────────
  function render(){
    backEl.style.display = (phase==='q' && idx>=0) ? 'inline-flex' : 'none';
    if(phase==='loading'){ stepEl.innerHTML = '<div class="center" style="color:var(--mut)">Cargando…</div>'; return; }
    if(phase==='gate'){ renderGate(); return; }
    if(phase==='already'){ renderAlready(); return; }
    if(phase==='intro'){ renderIntro(); return; }
    if(phase==='q'){ renderQuestion(); return; }
    if(phase==='done'){ renderDone(); return; }
  }

  function shell(inner){
    stepEl.className = 'step anim';
    stepEl.innerHTML = '<div class="brand">presu<span>.</span></div>' + inner;
    // re-trigger animación
    void stepEl.offsetWidth;
  }

  function setBar(p){ barEl.style.width = Math.max(0,Math.min(100,p))+'%'; }

  // Correo no encontrado / sin correo
  function renderGate(){
    setBar(0);
    shell(
      '<div class="eb">Encuesta de Fundadores</div>'+
      '<h1 class="q">Confirma tu correo</h1>'+
      '<p class="help">Esta encuesta es solo para quienes ya están en la lista de espera. Usa el mismo correo con el que te inscribiste.</p>'+
      '<input class="field" id="gateInput" type="email" inputmode="email" autocomplete="email" placeholder="tu@correo.com" value="'+esc(email)+'">'+
      '<div class="err" id="gateErr"></div>'+
      '<div class="nav"><button class="btn btn-mint" id="gateBtn">Continuar <span class="kbd">↵</span></button></div>'
    );
    var inp = document.getElementById('gateInput');
    inp.focus();
    function go(){
      var v = inp.value.trim().toLowerCase();
      var errEl = document.getElementById('gateErr');
      if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)){ errEl.textContent='Escribe un correo válido.'; return; }
      errEl.textContent='Verificando…';
      fetch(API+'/survey?e='+encodeURIComponent(v),{cache:'no-store'}).then(function(r){return r.json();}).then(function(d){
        if(!d || !d.found){ errEl.textContent='Ese correo no está en la lista. ¿Usaste otro al inscribirte?'; return; }
        email=v; nombre=d.nombre||'';
        if(d.answered){ phase='already'; render(); return; }
        phase='intro'; render();
      }).catch(function(){ errEl.textContent='No pudimos verificar. Intenta de nuevo.'; });
    }
    document.getElementById('gateBtn').addEventListener('click', go);
    inp.addEventListener('keydown', function(e){ if(e.key==='Enter') go(); });
  }

  // Ya respondió
  function renderAlready(){
    setBar(100);
    var hola = nombre ? ('Gracias, '+esc(nombre)) : 'Gracias';
    shell(
      '<div class="check"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></div>'+
      '<h1 class="q center">'+hola+' 🌿</h1>'+
      '<p class="lead center">Ya tenemos tus respuestas. Quedaste en las <b>primeras invitaciones</b> de la beta. ¿Quieres ajustar algo?</p>'+
      '<div class="nav center" style="justify-content:center"><button class="btn btn-mint" id="editBtn">Editar mis respuestas</button></div>'
    );
    document.getElementById('editBtn').addEventListener('click', function(){ idx=-1; phase='intro'; render(); });
  }

  // Intro
  function renderIntro(){
    setBar(0);
    var hola = nombre ? ('Hola, '+esc(nombre)+' 👋') : 'Hola 👋';
    shell(
      '<div class="eb">Encuesta de Fundadores · 7 preguntas · ~2 min</div>'+
      '<p class="lead">'+hola+'</p>'+
      '<h1 class="q">Construyamos Presu <span style="color:var(--mint)">a tu medida</span></h1>'+
      '<p class="lead">Eres de los primeros en sumarte, así que queremos construir esto <b>contigo</b>. Cuéntanos quién eres y qué necesitas.</p>'+
      '<div class="pill">🎟️ Quien responde entra en las primeras invitaciones</div>'+
      '<div class="nav"><button class="btn btn-mint" id="startBtn">Empecemos <span class="kbd">↵</span></button></div>'+
      '<p class="consent">Solo lo usamos para mejorar Presu. No compartimos tus datos con nadie.</p>'
    );
    document.getElementById('startBtn').addEventListener('click', function(){ idx=0; phase='q'; render(); });
  }

  // Pregunta
  function renderQuestion(){
    var s = STEPS[idx];
    setBar(Math.round((idx/STEPS.length)*100));
    var head = '<div class="eb">Pregunta '+(idx+1)+' de '+STEPS.length+(s.optional?' <span class="opt">· opcional</span>':'')+'</div>'+
      '<h1 class="q">'+esc(s.q)+'</h1>'+ (s.help?('<p class="help">'+esc(s.help)+'</p>'):'');

    if(s.type==='single' || s.type==='multi'){
      var cur = answers[s.id];
      var opts = s.options.map(function(o,i){
        var sel = (s.type==='multi') ? (Array.isArray(cur)&&cur.indexOf(o)>=0) : (cur===o);
        var key = (i<9)?(i+1):'';
        return '<button class="opt-btn'+(sel?' sel':'')+'" data-o="'+esc(o)+'">'+
          '<span class="key">'+key+'</span><span>'+esc(o)+'</span>'+
          '<span class="tick">✓</span></button>';
      }).join('');
      var nav = (s.type==='multi')
        ? '<div class="nav"><button class="btn btn-mint" id="contBtn">Continuar <span class="kbd">↵</span></button>'+(s.optional?'<button class="skip" id="skipBtn">Saltar</button>':'')+'</div>'
        : (s.optional?'<div class="nav"><button class="skip" id="skipBtn">Prefiero no decir</button></div>':'');
      shell(head+'<div class="opts">'+opts+'</div>'+nav+
        '<div class="hintline"><kbd>1</kbd>–<kbd>'+s.options.length+'</kbd> para elegir · <kbd>↵</kbd> para seguir</div>');

      Array.prototype.forEach.call(stepEl.querySelectorAll('.opt-btn'), function(btn){
        btn.addEventListener('click', function(){ pick(s, btn.getAttribute('data-o')); });
      });
      if(s.type==='multi'){ document.getElementById('contBtn').addEventListener('click', next); }
      var sk = document.getElementById('skipBtn'); if(sk) sk.addEventListener('click', function(){ delete answers[s.id]; next(); });

    } else { // text
      var val = answers[s.id]||'';
      shell(head+
        '<input class="field" id="txt" type="text" autocomplete="off" placeholder="'+esc(s.placeholder||'')+'" value="'+esc(val)+'">'+
        '<div class="nav"><button class="btn btn-mint" id="contBtn">Continuar <span class="kbd">↵</span></button>'+
        (s.optional?'<button class="skip" id="skipBtn">Saltar</button>':'')+'</div>');
      var t = document.getElementById('txt');
      t.focus(); t.setSelectionRange(t.value.length,t.value.length);
      document.getElementById('contBtn').addEventListener('click', function(){ commitText(s); });
      t.addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); commitText(s); } });
      var sk2 = document.getElementById('skipBtn'); if(sk2) sk2.addEventListener('click', function(){ delete answers[s.id]; next(); });
    }
  }

  function pick(s, val){
    if(s.type==='multi'){
      var arr = Array.isArray(answers[s.id])?answers[s.id].slice():[];
      var i = arr.indexOf(val);
      if(i>=0) arr.splice(i,1); else arr.push(val);
      answers[s.id]=arr;
      // re-render para reflejar selección sin perder foco de teclado
      var sel = arr;
      Array.prototype.forEach.call(stepEl.querySelectorAll('.opt-btn'), function(btn){
        var on = sel.indexOf(btn.getAttribute('data-o'))>=0;
        btn.classList.toggle('sel', on);
      });
    } else {
      answers[s.id]=val;
      Array.prototype.forEach.call(stepEl.querySelectorAll('.opt-btn'), function(btn){
        btn.classList.toggle('sel', btn.getAttribute('data-o')===val);
      });
      setTimeout(next, 240); // auto-avance con feedback visual
    }
  }

  function commitText(s){
    var t = document.getElementById('txt');
    var v = (t.value||'').trim();
    if(v) answers[s.id]=v; else { if(s.optional){ delete answers[s.id]; } else { t.focus(); return; } }
    if(!s.optional && !v){ t.focus(); return; }
    next();
  }

  function next(){
    if(idx >= STEPS.length-1){ submit(); return; }
    idx++; render();
  }
  function back(){
    if(idx<=0){ idx=-1; phase='intro'; render(); return; }
    idx--; render();
  }

  // ── Envío ──────────────────────────────────────────────────
  function submit(){
    phase='done'; setBar(100); renderSending();
    fetch(API+'/survey',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:email, answers:answers})})
      .then(function(r){return r.json();})
      .then(function(d){
        if(d && (d.status==='ok'||d.status==='updated')){ renderDone(); }
        else { renderError(d && d.reason); }
      })
      .catch(function(){ renderError('network'); });
  }
  function renderSending(){ backEl.style.display='none'; shell('<div class="center" style="color:var(--mut)">Guardando tus respuestas…</div>'); }
  function renderError(reason){
    var msg = reason==='not_in_list' ? 'Ese correo no está en la lista.' : 'No pudimos guardar. Revisa tu conexión.';
    shell('<h1 class="q center">Ups 😅</h1><p class="lead center">'+msg+'</p>'+
      '<div class="nav center" style="justify-content:center"><button class="btn btn-mint" id="retry">Reintentar</button></div>');
    document.getElementById('retry').addEventListener('click', submit);
  }
  function renderDone(){
    confetti();
    shell(
      '<div class="check"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></div>'+
      '<h1 class="q center">¡Listo! Gracias 🌿</h1>'+
      '<p class="lead center">Tus respuestas nos ayudan a construir un Presu que de verdad te sirva. '+
      'Quedaste en las <b>primeras invitaciones</b> cuando abramos la beta.</p>'+
      '<div class="nav center" style="justify-content:center">'+
      '<a class="btn btn-mint" href="https://presu.asimetrica.co">Volver a Presu</a></div>'+
      '<p class="consent center">Tu plata, clara.</p>'
    );
  }

  function confetti(){
    var colors=['#34D399','#5EEAB8','#F4F4F3','#0E9F6E'];
    for(var i=0;i<26;i++){
      var c=document.createElement('i');
      c.style.left=(Math.random()*100)+'%';
      c.style.background=colors[i%colors.length];
      c.style.animationDuration=(1.6+Math.random()*1.4)+'s';
      c.style.animationDelay=(Math.random()*.25)+'s';
      c.style.transform='rotate('+(Math.random()*360)+'deg)';
      confEl.appendChild(c);
    }
    setTimeout(function(){ confEl.innerHTML=''; }, 3600);
  }

  // ── Teclado global ─────────────────────────────────────────
  document.addEventListener('keydown', function(e){
    if(phase!=='q') return;
    var s = STEPS[idx];
    var typing = (document.activeElement && document.activeElement.classList.contains('field'));
    // números → elegir opción
    if((s.type==='single'||s.type==='multi') && /^[1-9]$/.test(e.key)){
      var i=parseInt(e.key,10)-1;
      if(i<s.options.length){ e.preventDefault(); pick(s, s.options[i]); }
      return;
    }
    if(e.key==='Enter' && !typing){
      e.preventDefault();
      if(s.type==='multi'){ next(); }
      else if(s.type==='single'){ if(answers[s.id]) next(); else if(s.optional) next(); }
      return;
    }
    if((e.key==='Backspace'||e.key==='ArrowLeft') && !typing){ e.preventDefault(); back(); }
  });
  backEl.addEventListener('click', back);

  boot();
})();
</script>
</body>
</html>
