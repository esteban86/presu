name = "presu-waitlist"
main = "waitlist.js"
compatibility_date = "2024-11-01"
# IMPORTANTE: el sitio (registro/encuesta/contador) llama a la API por el
# subdominio *.workers.dev, así que debe quedar HABILITADO. Definir `routes`
# lo apagaría (workers_dev=false por defecto) y rompería el sitio → NO usar
# routes aquí. El branding de presu.io/r se hace con un Pages Function.
workers_dev = true

# El binding del KV se completa con el id tras crear el namespace:
#   npx wrangler kv namespace create WAITLIST
[[kv_namespaces]]
binding = "WAITLIST"
id = "7aec6338c2e042e3acc5c03a592c0da7"

# R2: almacén de imágenes de documentos anonimizados aportados (página /aporta).
[[r2_buckets]]
binding = "DOCS"
bucket_name = "presu-docs"

# Rate-limit por Durable Object (fuertemente consistente → frena ráfagas; el
# binding nativo 'ratelimit' resultó no-op en esta cuenta). Un id por bucket:ip;
# el límite/ventana se pasan por request desde el código.
[[durable_objects.bindings]]
name = "RL"
class_name = "RateLimiter"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiter"]

# Cron: respaldo diario de la waitlist (KV → R2) a las 08:00 UTC = 03:00 Bogotá
# (tráfico bajo). El handler `scheduled` hace SOLO el backup (backupToR2); ya NO
# drena campañas (el cron zombie del 25-jun se retiró: "0-19 17 25 6 *" no fijaba
# AÑO y re-enviaba la campaña vieja cada 25-jun). Los drenajes de campaña hoy son a
# mano vía /admin/*-batch. Nota: [triggers] lo hereda [env.staging] → staging también
# respalda su propio KV a su propio R2 (inofensivo). Un cron diario SÍ debe repetirse.
[triggers]
crons = ["0 8 * * *"]

# Workers Logs: captura console.log/error + excepciones (antes: 0 logs, 45 catch
# vacíos → ciegos). head_sampling_rate=1 = 100% de invocaciones (volumen bajo).
[observability]
enabled = true
head_sampling_rate = 1

# WEB3FORMS_KEY se carga como secret (no se commitea):
#   npx wrangler secret put WEB3FORMS_KEY

# ── Entorno de PRUEBAS (staging) ──────────────────────────────
# Worker y KV aparte para probar la campaña de referidos sin tocar producción.
#   Deploy:  npx wrangler deploy --env staging
[env.staging]
name = "presu-waitlist-staging"

[[env.staging.kv_namespaces]]
binding = "WAITLIST"
id = "14cae570f4024c458142cd264a3775e8"

[[env.staging.r2_buckets]]
binding = "DOCS"
bucket_name = "presu-docs-staging"

# Rate-limit por Durable Object (instancias propias del worker de staging).
[[env.staging.durable_objects.bindings]]
name = "RL"
class_name = "RateLimiter"

[env.staging.vars]
NOTIFY_EMAIL = "esteban@aleph0.com.co"
# Llave de PRUEBA oficial de Cloudflare (always-pass, es pública) — solo staging.
# En PROD el secret real se pone con:  wrangler secret put TURNSTILE_SECRET
TURNSTILE_SECRET = "1x0000000000000000000000000000000AA"
