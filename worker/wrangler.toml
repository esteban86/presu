name = "presu-waitlist"
main = "waitlist.js"
compatibility_date = "2024-11-01"
# IMPORTANTE: el sitio (registro/encuesta/contador) llama a la API por el
# subdominio *.workers.dev, así que debe quedar HABILITADO. Definir `routes`
# lo apagaría (workers_dev=false por defecto) y rompería el sitio → NO usar
# routes aquí. El branding de presu.io/r se hace con un Pages Function.
workers_dev = true

# El binding del KV se completa con el id tras crear el namespace:
#   npx wrangler kv namespace create WAITLIST
[[kv_namespaces]]
binding = "WAITLIST"
id = "7aec6338c2e042e3acc5c03a592c0da7"

# R2: almacén de imágenes de documentos anonimizados aportados (página /aporta).
[[r2_buckets]]
binding = "DOCS"
bucket_name = "presu-docs"

# (Sin cron.) El cron de lanzamiento del 25-jun ya cumplió y se retiró: el patrón
# "0-19 17 25 6 *" no fija AÑO, así que se re-disparaba cada 25 de junio para
# siempre, re-enviando la campaña vieja. El drenaje de campañas hoy se hace a mano
# vía /admin/*-batch. Si se necesita un cron puntual, definirlo con fecha y quitarlo
# después (y recordar que [triggers] es heredable por [env.staging]).

# WEB3FORMS_KEY se carga como secret (no se commitea):
#   npx wrangler secret put WEB3FORMS_KEY

# ── Entorno de PRUEBAS (staging) ──────────────────────────────
# Worker y KV aparte para probar la campaña de referidos sin tocar producción.
#   Deploy:  npx wrangler deploy --env staging
[env.staging]
name = "presu-waitlist-staging"

[[env.staging.kv_namespaces]]
binding = "WAITLIST"
id = "14cae570f4024c458142cd264a3775e8"

[[env.staging.r2_buckets]]
binding = "DOCS"
bucket_name = "presu-docs-staging"

[env.staging.vars]
NOTIFY_EMAIL = "esteban@aleph0.com.co"
