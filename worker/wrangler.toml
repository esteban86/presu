name = "presu-waitlist"
main = "waitlist.js"
compatibility_date = "2024-11-01"

# El binding del KV se completa con el id tras crear el namespace:
#   npx wrangler kv namespace create WAITLIST
[[kv_namespaces]]
binding = "WAITLIST"
id = "7aec6338c2e042e3acc5c03a592c0da7"

# R2: almacén de imágenes de documentos anonimizados aportados (página /aporta).
[[r2_buckets]]
binding = "DOCS"
bucket_name = "presu-docs"

# Cron de LANZAMIENTO (solo prod): jue 25 jun, 17:00–17:19 UTC = 12:00pm (mediodía) Colombia.
# Dispara cada minuto en esa ventana; cada disparo envía un lote (idempotente),
# así drena toda la base en ~14 min. Pasada esa fecha no vuelve a dispararse.
[triggers]
crons = ["0-19 17 25 6 *"]

# WEB3FORMS_KEY se carga como secret (no se commitea):
#   npx wrangler secret put WEB3FORMS_KEY

# ── Entorno de PRUEBAS (staging) ──────────────────────────────
# Worker y KV aparte para probar la campaña de referidos sin tocar producción.
#   Deploy:  npx wrangler deploy --env staging
[env.staging]
name = "presu-waitlist-staging"

[[env.staging.kv_namespaces]]
binding = "WAITLIST"
id = "14cae570f4024c458142cd264a3775e8"

[[env.staging.r2_buckets]]
binding = "DOCS"
bucket_name = "presu-docs-staging"

[env.staging.vars]
NOTIFY_EMAIL = "esteban@aleph0.com.co"
