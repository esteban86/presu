<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Ranking en vivo · Presu</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--mint:#34D399;--mint-bright:#5EEAB8;--ink:#08231A;--tx:#F4F4F3;--mut:#A1A1A6;--mut2:#6B6B72;--bg:#08080A;--bg2:#101014;--bg3:#16161A;--line:rgba(255,255,255,.1);--head:"Space Grotesk",sans-serif;--mono:"JetBrains Mono",monospace}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--tx);font-family:"Hanken Grotesk",sans-serif;line-height:1.5;padding:44px 20px}
  .wrap{max-width:560px;margin:0 auto}
  .brand{font-family:var(--head);font-weight:700;font-size:23px;letter-spacing:-.02em}
  .brand span{color:var(--mint)}
  .eb{font-family:var(--mono);font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--mint);margin:6px 0 20px}
  .totals{display:flex;gap:12px;margin-bottom:22px}
  .stat{flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:16px 18px}
  .stat .n{font-family:var(--head);font-weight:700;font-size:2rem;color:#fff;font-variant-numeric:tabular-nums;line-height:1}
  .stat .l{font-size:.8rem;color:var(--mut);margin-top:5px}
  .live{display:inline-flex;align-items:center;gap:7px;font-size:.78rem;color:var(--mut2);margin-bottom:14px;font-family:var(--mono)}
  .live .dot{width:7px;height:7px;border-radius:50%;background:var(--mint);box-shadow:0 0 8px var(--mint);animation:p 2s infinite}
  @keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
  .rank{list-style:none;margin:0;padding:0;background:var(--bg2);border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .rank li{display:flex;align-items:center;gap:13px;padding:13px 16px;border-bottom:1px solid var(--line);font-size:.97rem}
  .rank li:last-child{border-bottom:0}
  .rank .pos{width:30px;font-family:var(--mono);color:var(--mut2);font-weight:600}
  .rank .nm{flex:1;color:var(--tx)}
  .rank .ct{font-family:var(--mono);color:var(--mint-bright);font-weight:600}
  .rank li.podio{background:rgba(52,211,153,.07)}
  .rank li.podio .pos{color:var(--mint)}
  .rank li.podio .nm{font-weight:600}
  .medal{font-size:1rem}
  .muted{color:var(--mut2);font-size:.8rem;margin-top:14px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">presu<span>.</span></div>
  <div class="eb">Ranking de Fundadores · en vivo</div>
  <div class="totals">
    <div class="stat"><div class="n" id="total">—</div><div class="l">en la lista</div></div>
    <div class="stat"><div class="n" id="fnd">—</div><div class="l">Fundadores (3+)</div></div>
  </div>
  <div class="live"><span class="dot"></span><span id="ago">actualizando…</span></div>
  <ul class="rank" id="rank"><li><span class="nm" style="color:var(--mut)">Cargando…</span></li></ul>
  <p class="muted">El <b style="color:var(--mint)">Top 3</b> al cierre se lleva el premio (1:1 + libro). Se actualiza solo cada 20s.</p>
</div>
<script>
(function(){
  var API='https://presu-waitlist.asimetrica.workers.dev';
  var medals=['🥇','🥈','🥉'];
  function esc(s){return String(s||'').replace(/[&<>"]/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];});}
  function load(){
    Promise.all([
      fetch(API+'/leaderboard',{cache:'no-store'}).then(function(r){return r.json();}),
      fetch(API+'/count',{cache:'no-store'}).then(function(r){return r.json();}),
      fetch(API+'/founders',{cache:'no-store'}).then(function(r){return r.json();}).catch(function(){return{total:0};})
    ]).then(function(res){
      var lb=res[0], cnt=res[1], fnd=res[2];
      document.getElementById('total').textContent=(cnt&&cnt.count!=null)?cnt.count.toLocaleString('es-CO'):'—';
      document.getElementById('fnd').textContent=(fnd&&fnd.total!=null)?fnd.total:'0';
      var top=(lb&&lb.top)||[];
      document.getElementById('rank').innerHTML = top.length
        ? top.map(function(x,i){ return '<li class="'+(i<3?'podio':'')+'"><span class="pos">'+(i<3?medals[i]:(i+1))+'</span><span class="nm">'+esc(x.name)+'</span><span class="ct">'+x.count+'</span></li>'; }).join('')
        : '<li><span class="nm" style="color:var(--mut)">Aún nadie con referidos. ¡Pronto se llena!</span></li>';
      document.getElementById('ago').textContent='actualizado ahora';
      setTimeout(function(){var a=document.getElementById('ago'); if(a)a.textContent='actualiza cada 20s';},2000);
    }).catch(function(){ document.getElementById('ago').textContent='reintentando…'; });
  }
  load(); setInterval(load, 20000);
})();
</script>
</body>
</html>
