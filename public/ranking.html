<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Ranking en vivo · Presu</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--mint:#34D399;--mint-bright:#5EEAB8;--ink:#08231A;--tx:#F4F4F3;--mut:#A1A1A6;--mut2:#6B6B72;--bg:#08080A;--bg2:#101014;--bg3:#16161A;--line:rgba(255,255,255,.1);--head:"Space Grotesk",sans-serif;--mono:"JetBrains Mono",monospace}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--tx);font-family:"Hanken Grotesk",sans-serif;line-height:1.5}
  .wrap{max-width:560px;margin:0 auto;padding:44px 20px 60px}
  .brand{font-family:var(--head);font-weight:700;font-size:23px;letter-spacing:-.02em}
  .brand span{color:var(--mint)}
  .eb{font-family:var(--mono);font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--mint);margin:6px 0 20px}
  .totals{display:flex;gap:12px;margin-bottom:22px}
  .stat{flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:16px 18px}
  .stat .n{font-family:var(--head);font-weight:700;font-size:2rem;color:#fff;font-variant-numeric:tabular-nums;line-height:1}
  .stat .l{font-size:.8rem;color:var(--mut);margin-top:5px}
  .live{display:inline-flex;align-items:center;gap:7px;font-size:.78rem;color:var(--mut2);margin-bottom:14px;font-family:var(--mono)}
  .live .dot{width:7px;height:7px;border-radius:50%;background:var(--mint);box-shadow:0 0 8px var(--mint);animation:p 2s infinite}
  @keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
  .rank{list-style:none;margin:0;padding:0;background:var(--bg2);border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .rank li{display:flex;align-items:center;gap:13px;padding:13px 16px;border-bottom:1px solid var(--line);font-size:.97rem}
  .rank li:last-child{border-bottom:0}
  .rank .pos{width:30px;font-family:var(--mono);color:var(--mut2);font-weight:600}
  .rank .nm{flex:1;color:var(--tx)}
  .rank .ct{font-family:var(--mono);color:var(--mint-bright);font-weight:600}
  .rank li.podio{background:rgba(52,211,153,.07)}
  .rank li.podio .pos{color:var(--mint)}
  .rank li.podio .nm{font-weight:600}
  .medal{font-size:1rem}
  .muted{color:var(--mut2);font-size:.8rem;margin-top:14px;text-align:center}
  /* wordmark */
  .wordmark{position:relative;display:inline-flex;align-items:center;line-height:.9}
  .wm-text{position:relative;z-index:1;font-family:var(--head);font-weight:700;font-size:1.375rem;letter-spacing:-.05em;color:var(--tx);line-height:.9}
  .wm-bar{position:absolute;left:-5%;right:-8%;top:53%;height:.36em;border-radius:999px;background:var(--mint);transform:rotate(-9deg);z-index:0}
  /* Site header (igual al resto del sitio) */
  .site-header{position:sticky;top:0;z-index:100;background:rgba(8,8,10,.72);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
  .sh-wrap{max-width:1200px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px;text-align:left}
  .sh-brand{display:flex;align-items:center;gap:12px;min-width:0}
  .sh-logo{display:inline-flex;text-decoration:none}
  .sh-endorse{display:inline-flex;align-items:center;gap:7px;padding-left:12px;border-left:1px solid var(--line);font-family:"Hanken Grotesk",sans-serif;font-size:.8rem;font-weight:500;color:var(--mut2);text-decoration:none;white-space:nowrap}
  .sh-endorse img{height:.95rem;width:auto;display:block}
  .sh-nav{display:flex;align-items:center;gap:26px}
  .sh-nav a{font-family:"Hanken Grotesk",sans-serif;font-size:1rem;font-weight:500;color:var(--mut);text-decoration:none;transition:color .16s}
  .sh-nav a:hover{color:var(--tx)}
  .sh-cta{display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:9px 20px;border-radius:999px;background:var(--mint);color:#06231A;font-family:"Hanken Grotesk",sans-serif;font-weight:700;font-size:.9rem;text-decoration:none;white-space:nowrap;transition:background .16s}
  .sh-cta:hover{background:var(--mint-bright)}
  .sh-actions{display:flex;align-items:center;gap:10px}
.sh-burger{display:none;flex-direction:column;justify-content:center;gap:5px;width:42px;height:42px;padding:0;background:none;border:1px solid var(--line);border-radius:11px;cursor:pointer}
.sh-burger span{display:block;width:20px;height:2px;margin:0 auto;background:var(--tx);border-radius:2px;transition:transform .22s,opacity .22s}
.sh-burger[aria-expanded="true"] span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.sh-burger[aria-expanded="true"] span:nth-child(2){opacity:0}
.sh-burger[aria-expanded="true"] span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
@media(max-width:640px){
  .sh-endorse{display:none}
  .sh-burger{display:flex}
  .sh-wrap{padding:12px 16px}
  .sh-nav{position:absolute;top:100%;left:0;right:0;flex-direction:column;align-items:stretch;gap:0;padding:6px 16px 14px;background:var(--bg);border-bottom:1px solid var(--line);display:none}
  .site-header.is-open .sh-nav{display:flex}
  .sh-nav a{padding:14px 4px;font-size:1.05rem;border-bottom:1px solid var(--line)}
  .sh-nav a:last-child{border-bottom:0}
}
</style>
</head>
<body>
<header class="site-header">
  <div class="sh-wrap">
    <div class="sh-brand">
      <a class="sh-logo" href="/" aria-label="Presu — inicio"><span class="wordmark"><span class="wm-bar" aria-hidden="true"></span><span class="wm-text">presu</span></span></a>
      <a class="sh-endorse" href="https://asimetrica.co" target="_blank" rel="noopener"><span>de</span><img src="/asimetrica-logo.webp" alt="Asimétrica"></a>
    </div>
    <nav class="sh-nav" id="sh-nav">
      <a href="/#como">Cómo</a>
      <a href="/#privacidad">Privacidad</a>
      <a href="/#planes">Planes</a>
      <a href="/aporta">Aporta 🌱</a>
    </nav>
    <div class="sh-actions"><a class="sh-cta" href="/#waitlist">Únete a la lista</a><button class="sh-burger" type="button" aria-label="Abrir menú" aria-expanded="false" aria-controls="sh-nav"><span></span><span></span><span></span></button></div>
  </div>
</header>
<div class="wrap">
  <div class="eb">Ranking de Fundadores · en vivo</div>
  <div class="totals">
    <div class="stat"><div class="n" id="total">—</div><div class="l">en la lista</div></div>
    <div class="stat"><div class="n" id="fnd">—</div><div class="l">Fundadores (3+)</div></div>
  </div>
  <div class="live"><span class="dot"></span><span id="ago">actualizando…</span></div>
  <ul class="rank" id="rank"><li><span class="nm" style="color:var(--mut)">Cargando…</span></li></ul>
  <p class="muted">El <b style="color:var(--mint)">Top 3</b> al cierre se lleva el premio (1:1 + libro). Se actualiza solo cada 20s.</p>
  <p style="text-align:center;margin-top:14px"><a href="#" id="adminBtn" style="color:var(--mut2);font-size:.78rem;text-decoration:underline">🔒 Ver con nombres y correos (admin)</a></p>
</div>
<script>
(function(){
  var API='https://presu-waitlist.asimetrica.workers.dev';
  var medals=['🥇','🥈','🥉'];
  var adminToken = sessionStorage.getItem('presu_admin') || '';
  function esc(s){return String(s||'').replace(/[&<>"]/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];});}
  function load(){
    Promise.all([
      fetch(API+'/leaderboard',{cache:'no-store'}).then(function(r){return r.json();}),
      fetch(API+'/count',{cache:'no-store'}).then(function(r){return r.json();}),
      fetch(API+'/founders',{cache:'no-store'}).then(function(r){return r.json();}).catch(function(){return{total:0};})
    ]).then(function(res){
      var lb=res[0], cnt=res[1], fnd=res[2];
      document.getElementById('total').textContent=(cnt&&cnt.count!=null)?cnt.count.toLocaleString('es-CO'):'—';
      document.getElementById('fnd').textContent=(fnd&&fnd.total!=null)?fnd.total:'0';
      var top=(lb&&lb.top)||[];
      document.getElementById('rank').innerHTML = top.length
        ? top.map(function(x,i){ return '<li class="'+(i<3?'podio':'')+'"><span class="pos">'+(i<3?medals[i]:(i+1))+'</span><span class="nm">'+esc(x.name)+'</span><span class="ct">'+x.count+'</span></li>'; }).join('')
        : '<li><span class="nm" style="color:var(--mut)">Aún nadie con referidos. ¡Pronto se llena!</span></li>';
      document.getElementById('ago').textContent='actualizado ahora';
      setTimeout(function(){var a=document.getElementById('ago'); if(a)a.textContent='actualiza cada 20s';},2000);
    }).catch(function(){ document.getElementById('ago').textContent='reintentando…'; });
  }
  function rowsHtml(items, withEmail){
    if(!items.length) return '<li><span class="nm" style="color:var(--mut)">Aún nadie con referidos. ¡Pronto se llena!</span></li>';
    return items.map(function(x,i){
      var who = withEmail
        ? esc(x.name||'Pionero')+'<br><span style="font-size:.76rem;color:var(--mut2);font-family:var(--mono)">'+esc(x.email||'')+'</span>'
        : esc(x.name);
      return '<li class="'+(i<3?'podio':'')+'"><span class="pos">'+(i<3?medals[i]:(i+1))+'</span><span class="nm">'+who+'</span><span class="ct">'+x.count+'</span></li>';
    }).join('');
  }
  function loadAdmin(){
    fetch(API+'/admin/stats',{headers:{'X-Admin-Token':adminToken},cache:'no-store'}).then(function(r){return r.json();}).then(function(d){
      if(!d || d.error){ alert('Token inválido.'); adminToken=''; sessionStorage.removeItem('presu_admin'); load(); return; }
      var lb=(d.leaderboard||[]);
      document.getElementById('total').textContent=(d.total!=null)?d.total.toLocaleString('es-CO'):'—';
      document.getElementById('fnd').textContent=lb.filter(function(x){return x.count>=3;}).length;
      document.getElementById('rank').innerHTML = rowsHtml(lb.slice(0,25), true);
      document.getElementById('ago').textContent='vista admin · actualizado';
      setTimeout(function(){var a=document.getElementById('ago'); if(a)a.textContent='vista admin · cada 20s';},2000);
    }).catch(function(){ document.getElementById('ago').textContent='reintentando…'; });
  }
  function tick(){ adminToken ? loadAdmin() : load(); }
  document.getElementById('adminBtn').addEventListener('click', function(e){
    e.preventDefault();
    var t=prompt('Pega tu token admin para ver nombres y correos:');
    if(t){ adminToken=t.trim(); sessionStorage.setItem('presu_admin', adminToken); tick(); }
  });
  tick(); setInterval(tick, 20000);
})();
</script>
<script>
(function(){var h=document.querySelector(".site-header"),b=h&&h.querySelector(".sh-burger");if(!h||!b)return;function c(){h.classList.remove("is-open");b.setAttribute("aria-expanded","false");}b.addEventListener("click",function(){var o=h.classList.toggle("is-open");b.setAttribute("aria-expanded",o?"true":"false");});h.querySelectorAll(".sh-nav a").forEach(function(a){a.addEventListener("click",c);});document.addEventListener("keydown",function(e){if(e.key==="Escape")c();});})();
</script>
</body>
</html>
