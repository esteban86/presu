<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Roadmap del Círculo · Presu</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{--mint:#34D399;--mint-bright:#5EEAB8;--ink:#08231A;--tx:#F4F4F3;--mut:#A1A1A6;--mut2:#6B6B72;--bg:#08080A;--bg2:#101014;--bg3:#16161A;--line:rgba(255,255,255,.1);--head:"Space Grotesk",sans-serif;--mono:"JetBrains Mono",monospace}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--tx);font-family:"Hanken Grotesk",sans-serif;line-height:1.5;padding:44px 20px}
  .wrap{max-width:600px;margin:0 auto}
  .brand{font-family:var(--head);font-weight:700;font-size:23px;letter-spacing:-.02em;margin-bottom:6px}
  .brand span{color:var(--mint)}
  .eb{font-family:var(--mono);font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--mint);margin-bottom:14px}
  h1{font-family:var(--head);font-weight:700;font-size:1.7rem;letter-spacing:-.02em;margin:0 0 6px}
  .sub{color:var(--mut);margin:0 0 26px;font-size:.95rem}
  .card{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:12px}
  .feat{display:flex;gap:14px;align-items:flex-start}
  .vote{flex:none;width:58px;display:flex;flex-direction:column;align-items:center;gap:2px;background:var(--bg3);border:1px solid var(--line);border-radius:12px;padding:8px 0;cursor:pointer;transition:.15s;user-select:none}
  .vote:hover{border-color:var(--mint)}
  .vote.on{background:rgba(52,211,153,.14);border-color:var(--mint)}
  .vote .arr{color:var(--mut);font-size:1rem;line-height:1}
  .vote.on .arr{color:var(--mint)}
  .vote .n{font-family:var(--mono);font-weight:600;color:var(--tx);font-size:1.05rem}
  .feat .body{flex:1;min-width:0}
  .feat .t{font-weight:600;color:var(--tx)}
  .feat .d{color:var(--mut);font-size:.92rem;margin-top:3px}
  .feat .by{color:var(--mut2);font-size:.78rem;margin-top:6px;font-family:var(--mono)}
  .form input,.form textarea{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:12px 14px;color:var(--tx);font-family:inherit;font-size:.95rem;margin-bottom:10px}
  .form textarea{min-height:64px;resize:vertical}
  .btn{border:0;border-radius:12px;padding:12px 18px;font-weight:700;font-size:.92rem;cursor:pointer;font-family:inherit;background:var(--mint);color:var(--ink)}
  .label{font-family:var(--mono);font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--mut2);margin-bottom:12px}
  .msg{color:var(--mut)}
  .gate{text-align:center;padding:30px 10px}
  .gate a{color:var(--mint-bright)}
  .back{display:inline-block;margin-top:26px;color:var(--mut);text-decoration:none;font-size:.9rem;border:1px solid var(--line);border-radius:999px;padding:8px 16px}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">presu<span>.</span></div>
  <div class="eb">Roadmap del Círculo</div>
  <div id="mount"><p class="msg">Cargando…</p></div>
</div>
<script>
(function(){
  var API = ['presu.asimetrica.co','presu.io','www.presu.io','presu.com.co'].indexOf(location.hostname) !== -1
    ? 'https://presu-waitlist.asimetrica.workers.dev'
    : 'https://presu-waitlist-staging.asimetrica.workers.dev';
  var code = (new URLSearchParams(location.search).get('code')||'').trim().toUpperCase();
  var mount = document.getElementById('mount');
  function esc(s){ return String(s||'').replace(/[&<>"]/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];}); }

  if(!code){ mount.innerHTML = '<div class="gate"><p class="msg">Falta tu código. Entra desde tu <a href="/fundador.html">panel de Fundador</a>.</p></div>'; return; }

  var feats = [];
  function render(){
    var list = feats.length
      ? feats.map(function(f){
          return '<div class="card"><div class="feat">'
            + '<div class="vote'+(f.voted?' on':'')+'" data-id="'+f.id+'"><span class="arr">▲</span><span class="n">'+(f.votes||0)+'</span></div>'
            + '<div class="body"><div class="t">'+esc(f.title)+'</div>'+(f.desc?'<div class="d">'+esc(f.desc)+'</div>':'')+'<div class="by">por '+esc(f.by||'Fundador')+'</div></div>'
            + '</div></div>';
        }).join('')
      : '<p class="msg">Aún no hay propuestas. ¡Sé el primero en proponer una función!</p>';
    mount.innerHTML =
      '<h1>Propón y vota las próximas funciones</h1>'
      + '<p class="sub">Exclusivo del Círculo. Lo más votado nos guía el roadmap de Presu.</p>'
      + '<div class="card form"><div class="label">Proponer una función</div>'
      + '<input id="t" maxlength="120" placeholder="Ej. Soporte para Banco W">'
      + '<textarea id="d" maxlength="400" placeholder="¿Para qué serviría? (opcional)"></textarea>'
      + '<button class="btn" id="send">Proponer</button></div>'
      + list
      + '<a class="back" href="/fundador.html?code='+code+'">← Volver a mi panel</a>';

    document.querySelectorAll('.vote').forEach(function(v){
      v.addEventListener('click', function(){
        fetch(API+'/roadmap/vote',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:code,id:v.getAttribute('data-id')})})
          .then(function(r){return r.json();}).then(function(res){ if(res.ok){ load(); } });
      });
    });
    document.getElementById('send').addEventListener('click', function(){
      var t=document.getElementById('t').value.trim(); if(t.length<3){ return; }
      var d=document.getElementById('d').value.trim();
      var btn=this; btn.textContent='Enviando…'; btn.disabled=true;
      fetch(API+'/roadmap/propose',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:code,title:t,desc:d})})
        .then(function(r){return r.json();}).then(function(res){
          if(res && res.ok){ feats.unshift({id:res.id,title:t,desc:d,by:'Tú',votes:1,voted:true}); render(); setTimeout(load,2500); }
          else { btn.textContent='Proponer'; btn.disabled=false; }
        }).catch(function(){ btn.textContent='Proponer'; btn.disabled=false; });
    });
  }
  function load(){
    fetch(API+'/roadmap?code='+code).then(function(r){ return r.json().then(function(j){return {s:r.status,j:j};}); }).then(function(o){
      if(o.s===403){ mount.innerHTML='<div class="gate"><h1>Esto es del Círculo de Fundadores</h1><p class="msg">El tablero de roadmap se desbloquea al llegar a <b style="color:var(--mint)">7 referidos</b>. Sigue invitando 🌱</p><a class="back" href="/fundador.html?code='+code+'">← Ver mi panel</a></div>'; return; }
      feats = (o.j && o.j.features) || []; render();
    }).catch(function(){ mount.innerHTML='<p class="msg">No pudimos cargar el tablero.</p>'; });
  }
  load();
})();
</script>
</body>
</html>
